<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#1B5EA3"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <!-- Gauge arc background -->
  <path d="M 262 662 A 300 300 0 1 1 762 662" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="50" stroke-linecap="round"/>
  <!-- Gauge arc filled (showing ~75% speed) -->
  <path d="M 262 662 A 300 300 0 1 1 692 412" fill="none" stroke="white" stroke-width="50" stroke-linecap="round"/>
  <!-- Needle -->
  <line x1="512" y1="562" x2="670" y2="390" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="512" cy="562" r="30" fill="white"/>
  <!-- Up arrow (upload) -->
  <polygon points="380,750 400,710 360,710" fill="rgba(255,255,255,0.7)"/>
  <rect x="375" y="750" width="10" height="30" fill="rgba(255,255,255,0.7)"/>
  <!-- Down arrow (download) -->
  <polygon points="644,780 664,740 624,740" fill="rgba(255,255,255,0.7)" transform="rotate(180,644,760)"/>
  <rect x="639" y="760" width="10" height="30" fill="rgba(255,255,255,0.7)"/>
</svg>
